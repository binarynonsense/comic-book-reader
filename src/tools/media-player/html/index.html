<div id="mp-div-topbar" class="mp-frame">
  <a id="mp-button-open" class="mp-button" title="open files"
    ><i class="fa fa-folder-open" aria-hidden="true"></i
  ></a>
  <div class="mp-separator"></div>
  <a id="mp-button-prev" class="mp-button" title="previous track"
    ><i class="fa fa-step-backward" aria-hidden="true"></i
  ></a>
  <a id="mp-button-play" class="mp-button" title="play"
    ><i class="fa fa-play" aria-hidden="true"></i
  ></a>
  <a id="mp-button-pause" class="mp-button" title="pause"
    ><i class="fa fa-pause" aria-hidden="true"></i
  ></a>
  <a id="mp-button-stop" class="mp-button mp-hidden" title="stop"
    ><i class="fa fa-stop" aria-hidden="true"></i
  ></a>
  <a id="mp-button-next" class="mp-button" title="next track"
    ><i class="fa fa-step-forward" aria-hidden="true"></i
  ></a>
  <div class="mp-time-wrapper">
    <div id="mp-slider-time-hover-tooltip">00:00</div>
    <input id="mp-slider-time" class="mp-slider" type="range" value="0" />
    <div id="mp-slider-time-status-overlay">00:00 / 00:00</div>
  </div>
  <div id="mp-div-volume">
    <a
      id="mp-button-volume-off"
      class="mp-button"
      title="volume off"
      style="max-width: 20px; min-width: 20px"
    >
      <!-- <i class="fa fa-volume-up" aria-hidden="true"></i
      > -->
      <svg class="mp-button-svg-icon">
        <use
          href="../assets/libs/fontawesome7/sprites_custom/volume_sheet.svg#volume"
        ></use>
      </svg>
    </a>
    <a
      id="mp-button-volume-on"
      class="mp-button mp-hidden"
      title="volume on"
      style="max-width: 20px; min-width: 20px"
    >
      <!-- <i class="fa fa-volume-xmark" aria-hidden="true"></i
    > -->
      <svg class="mp-button-svg-icon">
        <use
          href="../assets/libs/fontawesome7/sprites_custom/volume_sheet.svg#volume-xmark"
        ></use>
      </svg>
    </a>
    <div class="mp-volume-wrapper">
      <div id="mp-slider-volume-hover-tooltip">0%</div>
      <input
        id="mp-slider-volume"
        class="mp-slider"
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0.5"
      />
      <div id="mp-slider-volume-status-overlay">50%</div>
    </div>
  </div>
  <div class="mp-separator"></div>
  <a id="mp-button-settings" class="mp-button" title="settings"
    ><i class="fa fa-gear" aria-hidden="true"></i
  ></a>
</div>
<!-- ---------------  VIDEO PLAYERS---------------  -->
<div id="mp-video-div" class="mp-frame mp-hidden">
  <button id="mp-video-close-button" class="mp-widget-close-button">
    <i class="fas fa-times"></i>
  </button>
  <video id="mp-html-video" crossorigin="anonymous"></video>
  <div id="mp-video-title" class="mp-widget-title-div"></div>
  <div id="mp-video-subtitle"></div>
  <div id="mp-html-video-loading-div" class="mp-hidden">
    <div class="mp-html-video-loading-spinner"></div>
  </div>
</div>
<div id="mp-spectrum-div" class="mp-frame mp-hidden">
  <button id="mp-spectrum-close-button" class="mp-widget-close-button">
    <i class="fas fa-times"></i>
  </button>
  <div id="mp-spectrum-title" class="mp-widget-title-div"></div>
  <canvas id="mp-spectrum-canvas" width="400" height="100"></canvas>
  <div class="mp-spectrum-grid"></div>
</div>
<!-- ---------------   PLAYLIST    ---------------  -->
<div id="mp-div-playlist" class="mp-frame mp-hidden">
  <div id="mp-div-playlist-tracks"></div>
  <div id="mp-span-playlist-buttons-right">
    <a
      id="mp-button-close-playlist"
      class="mp-button mp-button-smaller"
      title=""
      ><i class="fa-solid fa-xmark"></i
    ></a>
  </div>
  <div id="mp-span-playlist-buttons-left">
    <a id="mp-button-clear" class="mp-button mp-button-smaller" title=""
      ><i class="fas fa-trash-alt"></i
    ></a>
    <a id="mp-button-add" class="mp-button mp-button-smaller" title=""
      ><i class="fas fa-plus"></i
    ></a>
    <a id="mp-button-delete" class="mp-button mp-button-smaller" title=""
      ><i class="fas fa-minus"></i
    ></a>
    <div class="mp-separator"></div>
    <a
      id="mp-button-shuffle-off"
      class="fa-stack mp-button mp-button-stacked mp-button-smaller"
    >
      <i class="fa fa-random fa-stack-1x" style="opacity: 0.3"></i>
      <i class="fa-solid fa-slash fa-stack-1x"></i>
    </a>
    <a
      id="mp-button-shuffle-on"
      class="mp-button mp-button-stacked mp-button-smaller"
    >
      <i class="fa fa-random"></i>
    </a>
    <a
      id="mp-button-repeat-off"
      class="fa-stack mp-button mp-button-stacked mp-button-smaller"
    >
      <i class="fa-solid fa-repeat fa-stack-1x" style="opacity: 0.3"></i>
      <i class="fa-solid fa-slash fa-stack-1x"></i>
    </a>
    <a
      id="mp-button-repeat-1"
      class="mp-button mp-button-stacked fa-stack mp-button-smaller"
    >
      <i class="fa-solid fa-repeat fa-stack-1x"></i>
      <strong class="fa-stack-1x mp-repeat-number">1</strong>
    </a>
    <a
      id="mp-button-repeat-all"
      class="mp-button mp-button-stacked mp-button-smaller"
    >
      <i class="fa-solid fa-repeat"></i>
    </a>
    <div class="mp-separator"></div>
    <a id="mp-button-save" class="mp-button mp-button-smaller" title=""
      ><i class="fas fa-save"></i
    ></a>
  </div>
</div>
